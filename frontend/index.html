<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Mobile Web App Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Expense Tracker" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23646cff' width='180' height='180'/><text x='90' y='120' font-size='100' font-weight='bold' text-anchor='middle' fill='white' font-family='Arial'>₹</text></svg>" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#646cff" />
    
    <!-- App Description -->
    <meta name="description" content="Track your daily expenses easily" />
    
    <title>Expense Tracker</title>
    <meta name="app-version" content="1.0.0" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
      // Check browser support and register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((registration) => {
              console.log('✅ Service Worker registered successfully', registration)
              
              // Check for updates
              setInterval(() => {
                registration.update()
              }, 60000) // Check every minute
            })
            .catch((error) => {
              console.log('❌ Service Worker registration failed:', error)
            })
        })
      }
      
      // Uninstall old service workers
      navigator.serviceWorker.getRegistrations().then((registrations) => {
        registrations.forEach((registration) => {
          if (registration.scope !== window.location.origin + '/') {
            registration.unregister()
          }
        })
      })
    </script>
  </body>
</html>
